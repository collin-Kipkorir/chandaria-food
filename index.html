
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Chandarana Foodplus — Fresh groceries, bakery & more</title>

		<!-- Primary SEO -->
		<meta name="description" content="Chandarana Foodplus — Fresh groceries, in-store bakeries, and convenient online grocery delivery across Kenya. Find jobs, apply fast, and shop quality brands." />
		<meta name="keywords" content="grocery, groceries, online grocery Kenya, Chandarana, bakery, food delivery, supermarket, jobs, careers" />
		<link rel="canonical" href="https://example.com/" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Chandarana Foodplus — Fresh groceries & bakery" />
		<meta property="og:description" content="Shop groceries, enjoy fresh bakery items, and discover career opportunities at Chandarana Foodplus. Same-day delivery across major Kenyan towns." />
		<meta property="og:url" content="/" />
		<meta property="og:image" content="/favicon.svg" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Chandarana Foodplus — Fresh groceries & bakery" />
		<meta name="twitter:description" content="Shop groceries, enjoy fresh bakery items, and discover career opportunities at Chandarana Foodplus." />
		<meta name="twitter:image" content="/favicon.svg" />

		<!-- Mobile / theme -->
		<meta name="theme-color" content="#f8f5ef" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Structured data (Organization) -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Organization",
				"name": "Chandarana Foodplus",
				"url": "https://example.com/",
			"logo": "/favicon.svg",
				"sameAs": [
					"https://www.facebook.com/yourpage",
					"https://www.instagram.com/yourpage",
					"https://twitter.com/yourpage"
				],
				"contactPoint": [{
					"@type": "ContactPoint",
					"telephone": "+254-700-000000",
					"contactType": "customer service",
					"areaServed": "KE"
				}]
			}
		</script>

	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
